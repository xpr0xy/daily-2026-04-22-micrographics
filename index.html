<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MICROGRAPHICS — Generative HUD System</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #eae7e0;
  color: #111;
  font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
  overflow: hidden;
  width: 100vw;
  height: 100vh;
  -webkit-font-smoothing: antialiased;
}
canvas {
  display: block;
  width: 100vw;
  height: 100vh;
}
#controls {
  position: fixed;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 8px;
  z-index: 100;
}
button {
  background: #111;
  color: #eae7e0;
  border: none;
  padding: 8px 18px;
  font-family: 'JetBrains Mono', 'Courier New', monospace;
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  transition: opacity 0.2s;
  -webkit-tap-highlight-color: transparent;
}
button:hover, button:active { opacity: 0.75; }
#info {
  position: fixed;
  top: 12px;
  left: 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: #999;
  z-index: 100;
  pointer-events: none;
  letter-spacing: 0.05em;
}
@media (max-width: 480px) {
  button { font-size: 9px; padding: 7px 14px; }
  #info { font-size: 8px; }
}
</style>
</head>
<body>
<canvas id="hud"></canvas>
<div id="info">MICROGRAPHICS v1.1 — PROCEDURAL INTERFACE</div>
<div id="controls">
  <button onclick="regenerate()">REGENERATE</button>
  <button onclick="exportPNG()">EXPORT PNG</button>
</div>
<script>
const canvas = document.getElementById('hud');
const ctx = canvas.getContext('2d');
let W, H, dpr, panels = [], time = 0;

const PAL = { bg:'#eae7e0', fg:'#111111', fg2:'#555555', fg3:'#888888', grid:'#dad7d0', alert:'#b03030' };
const JP = ['アクセス','光電','方式','稿','オフライン','オンライン','確認済み','接続中','待機'];
const EN = ['ARCHIVE_LOG','ACCESS','TARGET','MONITOR','SYSTEM','CRITICAL','VECTOR','DATACLUSTER','BANDWIDTH','RELAY','SENSOR','MODULE','EXPORT','DECODE','OFFLINE','ONLINE','STANDBY','ACTIVE','STABLE','SUSPENDED'];
const IDS=()=>Array(4).fill(0).map(()=>'0123456789ABCDEF'[Math.floor(Math.random()*16)]).join('');
const NODE=()=>Array(3).fill(0).map(()=>'ABCDEFGHJKLMNPQRSTUVWXYZ'[Math.floor(Math.random()*24)]).join('')+'-'+Math.floor(Math.random()*9000+1000);
const R=(a,b)=>Math.random()*(b-a)+a;
const RI=(a,b)=>Math.floor(R(a,b+1));
const P=(a)=>a[Math.floor(Math.random()*a.length)];

function resize(){
  dpr=window.devicePixelRatio||1;
  W=canvas.width=window.innerWidth*dpr;
  H=canvas.height=window.innerHeight*dpr;
  canvas.style.width=window.innerWidth+'px';
  canvas.style.height=window.innerHeight+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  W/=dpr; H/=dpr;
  regenerate();
}

class Panel{
  constructor(x,y,w,h){this.x=x;this.y=y;this.w=w;this.h=h;this.seed=Math.random();}
  border(ctx){
    ctx.strokeStyle=PAL.fg;ctx.lineWidth=1;
    ctx.strokeRect(this.x+.5,this.y+.5,this.w-1,this.h-1);
  }
  label(ctx,text,x,y,size=9,align='left',color=PAL.fg2,baseline='top'){
    ctx.font=`${size}px 'JetBrains Mono','Courier New',monospace`;
    ctx.fillStyle=color;ctx.textAlign=align;ctx.textBaseline=baseline;
    ctx.fillText(text,x,y);
  }
  safeW(){return Math.max(this.w-16,10);}
  safeH(){return Math.max(this.h-16,10);}
}

class DataPanel extends Panel{
  draw(ctx,t){
    this.border(ctx);
    this.label(ctx,P(EN),this.x+6,this.y+5,9,'left',PAL.fg);
    const lineH=14, maxLines=Math.max(1,Math.floor((this.h-22)/lineH));
    for(let i=0;i<maxLines;i++){
      const y=this.y+18+i*lineH;
      if(y>this.y+this.h-8)break;
      const key=P(['NODE','MODULE','PORT','ID','INDEX']);
      const val=key==='NODE'?NODE():key==='PORT'?RI(1,99):key==='INDEX'?RI(1e5,999999).toString().padStart(10,'0'):IDS();
      this.label(ctx,key+':',this.x+6,y,8,'left',PAL.fg3);
      this.label(ctx,val,this.x+this.w-6,y,8,'right',PAL.fg);
      if(i===0&&Math.sin(t*0.001+this.seed*10)>0.6){
        ctx.fillStyle=PAL.fg;ctx.fillRect(this.x+this.w-12,y+2,5,7);
      }
    }
  }
}

class GaugePanel extends Panel{
  draw(ctx,t){
    this.border(ctx);
    if(this.w<50||this.h<50)return;
    const cx=this.x+this.w/2,cy=this.y+this.h/2,r=Math.min(this.w,this.h)/2-14;
    const pct=(this.seed*100)%100;
    ctx.strokeStyle=PAL.grid;ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(cx,cy,r,-Math.PI*.75,Math.PI*.75);ctx.stroke();
    ctx.strokeStyle=PAL.fg;ctx.lineWidth=2.5;
    const end=-Math.PI*.75+(pct/100)*Math.PI*1.5;
    ctx.beginPath();ctx.arc(cx,cy,r,-Math.PI*.75,end);ctx.stroke();
    this.label(ctx,Math.floor(pct)+'%',cx,cy-5,12,'center',PAL.fg,'middle');
    this.label(ctx,P(['POWER','LOAD','SIGNAL']),cx,cy+9,8,'center',PAL.fg2,'middle');
  }
}

class WaveformPanel extends Panel{
  draw(ctx,t){
    this.border(ctx);
    this.label(ctx,'(ANALOG)',this.x+6,this.y+5,8,'left',PAL.fg2);
    const pad=8,h2=this.h/2,availH=Math.max(4,h2-pad*2);
    const availW=Math.max(10,this.w-pad*2);
    ctx.strokeStyle=PAL.fg;ctx.lineWidth=1;
    ctx.beginPath();
    for(let i=0;i<=availW;i++){
      const px=this.x+pad+i;
      const py=this.y+h2+Math.sin(i*0.04+t*0.0015+this.seed*50)*availH*.5+Math.sin(i*0.1+t*0.0008)*availH*.25;
      if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
    }
    ctx.stroke();
    ctx.strokeStyle=PAL.grid;ctx.beginPath();ctx.moveTo(this.x+pad,this.y+h2);ctx.lineTo(this.x+this.w-pad,this.y+h2);ctx.stroke();
  }
}

class NetworkPanel extends Panel{
  draw(ctx,t){
    this.border(ctx);
    this.label(ctx,'RELAY',this.x+6,this.y+5,8);
    const n=RI(3,6);
    const pad=10,nodes=[];
    for(let i=0;i<n;i++){
      nodes.push({x:this.x+pad+R(0,Math.max(1,this.w-pad*2)),y:this.y+16+R(0,Math.max(1,this.h-24))});
    }
    ctx.strokeStyle=PAL.fg2;ctx.lineWidth=.5;
    for(let i=0;i<nodes.length;i++){
      for(let j=i+1;j<nodes.length;j++){
        if(Math.random()>.5){
          ctx.beginPath();ctx.moveTo(nodes[i].x,nodes[i].y);ctx.lineTo(nodes[j].x,nodes[j].y);ctx.stroke();
        }
      }
    }
    for(const nd of nodes){
      ctx.fillStyle=PAL.bg;ctx.beginPath();ctx.arc(nd.x,nd.y,2.5,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle=PAL.fg;ctx.lineWidth=1;ctx.beginPath();ctx.arc(nd.x,nd.y,2.5,0,Math.PI*2);ctx.stroke();
    }
  }
}

class LogPanel extends Panel{
  draw(ctx,t){
    this.border(ctx);
    this.label(ctx,'LOG_'+RI(100,999)+'.TXT',this.x+6,this.y+5,8);
    const lines=['ACCESS GRANTED','PACKET RX','CHECKSUM OK','BUFFER OK','SYNC DONE'];
    const lineH=11,maxLines=Math.max(1,Math.floor((this.h-18)/lineH));
    for(let i=0;i<maxLines;i++){
      const y=this.y+16+i*lineH;
      if(y>this.y+this.h-5)break;
      const ts=`[${RI(0,23).toString().padStart(2,'0')}:${RI(0,59).toString().padStart(2,'0')}]`;
      this.label(ctx,ts+' '+P(lines),this.x+6,y,7,'left',i===0?PAL.fg:PAL.fg3);
    }
  }
}

class CompassPanel extends Panel{
  draw(ctx,t){
    this.border(ctx);
    if(this.w<60||this.h<60)return;
    const cx=this.x+this.w/2,cy=this.y+this.h/2,r=Math.min(this.w,this.h)/2-12;
    ctx.strokeStyle=PAL.fg;ctx.lineWidth=1;
    for(let i=0;i<8;i++){
      const a=(i/8)*Math.PI*2;
      const len=i%2===0?r:r-5;
      ctx.beginPath();ctx.moveTo(cx+Math.cos(a)*(r-3),cy+Math.sin(a)*(r-3));
      ctx.lineTo(cx+Math.cos(a)*len,cy+Math.sin(a)*len);ctx.stroke();
    }
    ctx.beginPath();ctx.arc(cx,cy,r-3,0,Math.PI*2);ctx.stroke();
    const arrowA=t*0.0003+this.seed*Math.PI*2;
    ctx.beginPath();ctx.moveTo(cx+Math.cos(arrowA)*r*.6,cy+Math.sin(arrowA)*r*.6);
    ctx.lineTo(cx+Math.cos(arrowA+2.8)*r*.25,cy+Math.sin(arrowA+2.8)*r*.25);
    ctx.lineTo(cx+Math.cos(arrowA-2.8)*r*.25,cy+Math.sin(arrowA-2.8)*r*.25);
    ctx.closePath();ctx.fillStyle=PAL.fg;ctx.fill();
  }
}

class LargeNumPanel extends Panel{
  draw(ctx,t){
    this.border(ctx);
    const num=RI(1,999).toString().padStart(3,'0');
    const fs=Math.min(this.safeW(),this.safeH())*.45;
    if(fs<10)return;
    ctx.font=`bold ${fs}px 'Inter',Arial,sans-serif`;
    ctx.fillStyle=PAL.fg;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(num,this.x+this.w/2,this.y+this.h/2);
    if(this.h>50)this.label(ctx,P(['VARIANT','MODULE','UNIT']),this.x+6,this.y+this.h-12,7);
  }
}

class HexPanel extends Panel{
  draw(ctx,t){
    this.border(ctx);
    this.label(ctx,'FIRM_'+RI(1,9).toString().padStart(2,'0'),this.x+6,this.y+5,8);
    const cols=Math.max(1,Math.floor(this.w/52));
    for(let i=0;i<6;i++){
      const col=i%cols,row=Math.floor(i/cols);
      this.label(ctx,'0x'+IDS()+IDS(),this.x+6+col*52,this.y+18+row*13,7);
    }
  }
}

class BarcodePanel extends Panel{
  draw(ctx,t){
    this.border(ctx);
    this.label(ctx,P(['PACKET LOSS','BANDWIDTH','UPTIME']),this.x+6,this.y+5,8);
    const bw=Math.max(10,this.w-12),bh=Math.max(8,this.h-28),bx=this.x+6,by=this.y+16;
    const bars=RI(10,20);const barW=bw/bars;
    for(let i=0;i<bars;i++){
      const h=R(.2,1)*bh;
      ctx.fillStyle=i%3===0?PAL.fg:PAL.fg2;
      ctx.fillRect(bx+i*barW+1,by+bh-h,Math.max(1,barW-2),h);
    }
    this.label(ctx,R(.1,99.9).toFixed(1)+P(['%','ms']),this.x+this.w-6,this.y+this.h-10,7,'right');
  }
}

class StatusPanel extends Panel{
  draw(ctx,t){
    this.border(ctx);
    const st=P([{l:'ONLINE',sub:P(JP),on:true},{l:'OFFLINE',sub:'STBY',on:false},{l:'ACTIVE',sub:'MON',on:true},{l:'ERROR',sub:'ID:'+IDS(),on:false}]);
    const blink=st.on&&Math.sin(t*0.002)>0;
    const fs=Math.min(this.safeW()*.2,Math.min(this.safeH()*.3,18));
    if(fs<8)return;
    ctx.font=`bold ${fs}px 'Inter',Arial,sans-serif`;
    ctx.fillStyle=blink?PAL.fg:PAL.fg3;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(st.l,this.x+this.w/2,this.y+this.h/2-4);
    this.label(ctx,st.sub,this.x+this.w/2,this.y+this.h/2+fs*.6,7,'center',PAL.fg2,'middle');
    if(st.on&&this.w>30){
      ctx.fillStyle=Math.sin(t*0.003)>0?PAL.fg:PAL.bg;
      ctx.beginPath();ctx.arc(this.x+8,this.y+8,2.5,0,Math.PI*2);ctx.fill();
    }
  }
}

class ErrorPanel extends Panel{
  draw(ctx,t){
    this.border(ctx);
    ctx.fillStyle=PAL.alert;ctx.fillRect(this.x+1,this.y+1,this.w-2,12);
    ctx.fillStyle='#fff';ctx.font=`bold 8px 'JetBrains Mono',monospace`;ctx.textAlign='center';
    ctx.fillText('ERR — ID:'+IDS()+'-'+IDS(),this.x+this.w/2,this.y+10);
    if(this.h>40){
      this.label(ctx,'REBOOT REQ',this.x+6,this.y+18,7);
      this.label(ctx,'PWR:'+RI(0,5)+'/100',this.x+6,this.y+30,7);
      const barW=Math.max(10,this.w-12);
      ctx.fillStyle=PAL.grid;ctx.fillRect(this.x+6,this.y+40,barW,3);
      ctx.fillStyle=PAL.alert;ctx.fillRect(this.x+6,this.y+40,barW*(RI(0,5)/100),3);
    }
  }
}

class DotGridPanel extends Panel{
  draw(ctx,t){
    this.border(ctx);
    this.label(ctx,P(['MEMORY','CONFIG','INDEX']),this.x+6,this.y+5,8);
    const cols=Math.max(2,Math.floor((this.w-12)/7));
    const rows=Math.max(2,Math.floor((this.h-20)/7));
    for(let r=0;r<rows;r++){
      for(let c=0;c<cols;c++){
        if(Math.random()>.3+this.seed*.4){
          ctx.fillStyle=((c+r+Math.floor(t*0.05))%9<1)?PAL.fg:PAL.fg2;
          ctx.fillRect(this.x+6+c*7,this.y+18+r*7,2,2);
        }
      }
    }
  }
}

class SpokePanel extends Panel{
  draw(ctx,t){
    this.border(ctx);
    this.label(ctx,'EPOCH',this.x+6,this.y+5,8);
    if(this.w<50||this.h<50)return;
    const cx=this.x+this.w/2,cy=this.y+this.h/2+2,r=Math.min(this.w,this.h)/2-14;
    const spokes=RI(5,10);
    ctx.strokeStyle=PAL.fg2;ctx.lineWidth=.5;
    for(let i=0;i<spokes;i++){
      const a=(i/spokes)*Math.PI*2+t*0.00015*this.seed;
      ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);ctx.stroke();
    }
    ctx.beginPath();ctx.arc(cx,cy,3,0,Math.PI*2);ctx.strokeStyle=PAL.fg;ctx.lineWidth=1;ctx.stroke();
    if(this.h>55)this.label(ctx,[R(0,99).toFixed(2),R(100,999).toFixed(2),R(100,999).toFixed(2)].join(' / '),this.x+this.w/2,this.y+this.h-10,6,'center',PAL.fg2);
  }
}

class OverlapPanel extends Panel{
  draw(ctx,t){
    this.border(ctx);
    if(this.w<50||this.h<50)return;
    const cx=this.x+this.w/2,cy=this.y+this.h/2,r=Math.min(this.w,this.h)/3;
    ctx.strokeStyle=PAL.fg;ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(cx-r*.35,cy,r,0,Math.PI*2);ctx.stroke();
    ctx.beginPath();ctx.arc(cx+r*.35,cy,r,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle=PAL.fg;
    ctx.fillRect(cx-1.5,cy-r+3,3,r*2-6);
    ctx.fillRect(cx-r+3,cy-1.5,r*2-6,3);
    this.label(ctx,'SYNC',this.x+this.w/2,this.y+6,7,'center');
  }
}

class TempPanel extends Panel{
  draw(ctx,t){
    this.border(ctx);
    this.label(ctx,'SENSORS',this.x+6,this.y+5,8);
    const readings=[{l:'TEMP',v:R(18,35).toFixed(1)+'°C'},{l:'PRESS',v:R(.8,2.5).toFixed(1)+'kPa'},{l:'VOLT',v:R(3,5.2).toFixed(1)+'V'}];
    const lineH=14,maxLines=Math.min(readings.length,Math.max(1,Math.floor((this.h-18)/lineH)));
    for(let i=0;i<maxLines;i++){
      const y=this.y+16+i*lineH;
      if(y>this.y+this.h-5)break;
      this.label(ctx,readings[i].l+':',this.x+6,y,7,'left',PAL.fg3);
      this.label(ctx,readings[i].v,this.x+this.w-6,y,7,'right',PAL.fg);
    }
  }
}

class GeoPanel extends Panel{
  draw(ctx,t){
    this.border(ctx);
    this.label(ctx,'EXPORT//'+RI(1000,9999),this.x+6,this.y+5,8);
    if(this.w<50||this.h<50)return;
    const cx=this.x+this.w/2,cy=this.y+this.h/2;
    const s=Math.min(this.w,this.h)*.25;
    ctx.strokeStyle=PAL.fg;ctx.lineWidth=1;
    ctx.beginPath();
    for(let i=0;i<6;i++){
      const a=(i/6)*Math.PI*2;const px=cx+Math.cos(a)*s,py=cy+Math.sin(a)*s;
      if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
    }
    ctx.closePath();ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx-s*.8,cy-s*.3);ctx.lineTo(cx+s*.8,cy+s*.3);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx+s*.8,cy-s*.3);ctx.lineTo(cx-s*.8,cy+s*.3);ctx.stroke();
    if(this.h>55)this.label(ctx,'OUT:A1',this.x+this.w/2,this.y+this.h-12,7,'center',PAL.fg2);
  }
}

class AccessPanel extends Panel{
  draw(ctx,t){
    this.border(ctx);
    const ok=this.seed>.5;
    ctx.fillStyle=ok?PAL.fg:PAL.alert;
    ctx.font=`bold 9px 'Inter',Arial,sans-serif`;ctx.textAlign='center';
    ctx.fillText(ok?'ACCESS CONFIRMED':'ACCESS DENIED',this.x+this.w/2,this.y+14);
    if(this.h>40){
      this.label(ctx,'NODE: '+NODE(),this.x+6,this.y+24,7);
      this.label(ctx,P(JP),this.x+this.w-6,this.y+24,7,'right',PAL.fg2);
    }
    if(ok&&this.w>50&&this.h>55){
      const cx=this.x+this.w/2,cy=this.y+this.h/2+10,r=8;
      ctx.strokeStyle=PAL.grid;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();
      const prog=(t*0.0005+this.seed)%1;
      ctx.beginPath();ctx.arc(cx,cy,r,-Math.PI/2,-Math.PI/2+prog*Math.PI*2);ctx.strokeStyle=PAL.fg;ctx.stroke();
    }
  }
}

class VertPanel extends Panel{
  draw(ctx,t){
    this.border(ctx);
    ctx.save();
    ctx.translate(this.x+10,this.y+this.h-6);
    ctx.rotate(-Math.PI/2);
    ctx.font=`bold 9px 'JetBrains Mono',monospace`;ctx.fillStyle=PAL.fg;ctx.textAlign='left';
    ctx.fillText('CTRL // '+P(['ALT','SHIFT','META']),0,0);
    ctx.restore();
    ctx.strokeStyle=PAL.fg2;ctx.lineWidth=.5;
    const n=Math.max(2,Math.floor((this.h-16)/10));
    for(let i=0;i<n;i++){
      const y=this.y+8+i*((this.h-16)/n);
      ctx.beginPath();ctx.moveTo(this.x+18,y);ctx.lineTo(this.x+this.w-6,y);ctx.stroke();
    }
  }
}

const TYPES=[DataPanel,GaugePanel,WaveformPanel,NetworkPanel,LogPanel,CompassPanel,LargeNumPanel,HexPanel,BarcodePanel,StatusPanel,ErrorPanel,DotGridPanel,SpokePanel,OverlapPanel,TempPanel,GeoPanel,AccessPanel,VertPanel];

function generateLayout(){
  panels=[];
  const cell=Math.min(Math.max(Math.floor(W/18),32),48);
  const cols=Math.floor(W/cell),rows=Math.floor(H/cell);
  const grid=Array(rows).fill(0).map(()=>Array(cols).fill(false));
  function can(x,y,w,h){if(x+w>cols||y+h>rows)return false;for(let i=y;i<y+h;i++)for(let j=x;j<x+w;j++)if(grid[i][j])return false;return true;}
  function place(x,y,w,h,p){for(let i=y;i<y+h;i++)for(let j=x;j<x+w;j++)grid[i][j]=true;p.x=x*cell;p.y=y*cell;p.w=w*cell;p.h=h*cell;panels.push(p);}
  const sizes=[[2,2],[2,3],[3,2],[3,3],[2,1],[1,2],[1,1],[3,1],[1,3],[4,2],[2,4]];
  for(let a=0;a<800;a++){
    const x=RI(0,cols-1),y=RI(0,rows-1),sz=P(sizes);
    if(can(x,y,sz[0],sz[1]))place(x,y,sz[0],sz[1],new(P(TYPES))(0,0,0,0));
  }
}

function draw(){
  ctx.fillStyle=PAL.bg;ctx.fillRect(0,0,W,H);
  // faint grid
  ctx.strokeStyle=PAL.grid;ctx.lineWidth=.5;
  for(let x=0;x<W;x+=Math.floor(W/18)){
    ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();
  }
  for(let y=0;y<H;y+=Math.floor(H/18)){
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
  }
  panels.forEach(p=>p.draw(ctx,time));
  // subtle scanlines
  ctx.fillStyle='rgba(0,0,0,0.02)';
  for(let y=0;y<H;y+=4)ctx.fillRect(0,y,W,1);
}

function loop(){time+=16;draw();requestAnimationFrame(loop);}
function regenerate(){generateLayout();}
function exportPNG(){
  const link=document.createElement('a');
  link.download='micrographics-'+Date.now()+'.png';
  link.href=canvas.toDataURL('image/png');
  link.click();
}
window.addEventListener('resize',resize);
resize();loop();
</script>
</body>
</html>
