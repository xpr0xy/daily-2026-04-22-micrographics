<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>MICROGRAPHICS — Generative HUD System</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #eae7e0;
  color: #111;
  font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
  overflow: hidden;
  width: 100vw;
  height: 100vh;
  -webkit-font-smoothing: antialiased;
}
canvas { display: block; width: 100vw; height: 100vh; }
#controls {
  position: fixed;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 8px;
  z-index: 100;
}
button {
  background: #111;
  color: #eae7e0;
  border: none;
  padding: 8px 18px;
  font-family: 'JetBrains Mono', 'Courier New', monospace;
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  transition: opacity 0.2s;
  -webkit-tap-highlight-color: transparent;
}
button:hover, button:active { opacity: 0.75; }
#info {
  position: fixed;
  top: 12px;
  left: 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: #999;
  z-index: 100;
  pointer-events: none;
  letter-spacing: 0.05em;
}
@media (max-width: 480px) {
  button { font-size: 9px; padding: 7px 14px; }
  #info { font-size: 8px; }
}
</style>
</head>
<body>
<canvas id="hud"></canvas>
<div id="info">MICROGRAPHICS v1.2 — CLIPPED</div>
<div id="controls">
  <button onclick="regenerate()">REGENERATE</button>
  <button onclick="exportPNG()">EXPORT PNG</button>
</div>
<script>
const canvas = document.getElementById('hud');
const ctx = canvas.getContext('2d');
let W, H, dpr, panels = [], time = 0, cell = 40;

const PAL = { bg:'#eae7e0', fg:'#111111', fg2:'#555555', fg3:'#888888', grid:'#d8d5ce', alert:'#b03030' };
const JP = ['アクセス','光電','方式','稿','オフライン','オンライン','確認済み'];
const EN = ['ARCHIVE','ACCESS','TARGET','MONITOR','SYSTEM','VECTOR','DATACLUSTER','BANDWIDTH','RELAY','SENSOR','MODULE','EXPORT','DECODE','OFFLINE','ONLINE','STBY','ACTIVE','STABLE'];
const IDS=()=>Array(4).fill(0).map(()=>'0123456789ABCDEF'[Math.floor(Math.random()*16)]).join('');
const NODE=()=>Array(3).fill(0).map(()=>'ABCDEFGHJKLMNPQRSTUVWXYZ'[Math.floor(Math.random()*24)]).join('')+'-'+Math.floor(Math.random()*9000+1000);
const R=(a,b)=>Math.random()*(b-a)+a;
const RI=(a,b)=>Math.floor(R(a,b+1));
const P=(a)=>a[Math.floor(Math.random()*a.length)];

let resizeTimer;
function resize(){
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(()=>{
    dpr=window.devicePixelRatio||1;
    W=canvas.width=window.innerWidth*dpr;
    H=canvas.height=window.innerHeight*dpr;
    canvas.style.width=window.innerWidth+'px';
    canvas.style.height=window.innerHeight+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
    W/=dpr; H/=dpr;
    cell = Math.min(Math.max(Math.floor(W/16), 36), 52);
    regenerate();
  }, 100);
}

class Panel{
  constructor(x,y,w,h){this.x=x;this.y=y;this.w=w;this.h=h;this.seed=Math.random();}
  wrap(ctx){
    ctx.save();
    ctx.beginPath();
    ctx.rect(this.x+0.5, this.y+0.5, this.w-1, this.h-1);
    ctx.clip();
    ctx.strokeStyle=PAL.fg; ctx.lineWidth=1;
    ctx.strokeRect(this.x+0.5, this.y+0.5, this.w-1, this.h-1);
  }
  unwrap(ctx){ ctx.restore(); }
  txt(ctx,text,x,y,size=9,align='left',color=PAL.fg2,bl='top'){
    ctx.font=`${size}px 'JetBrains Mono','Courier New',monospace`;
    ctx.fillStyle=color; ctx.textAlign=align; ctx.textBaseline=bl;
    ctx.fillText(text,x,y);
  }
  fit(txt,size){ return ctx.measureText(txt).width < this.w-12; }
}

class DataP extends Panel{
  draw(ctx,t){
    this.wrap(ctx);
    this.txt(ctx,P(EN),this.x+6,this.y+6,Math.min(9,this.h/4),'left',PAL.fg);
    const lh=Math.max(11, this.h/5);
    const maxL=Math.max(1, Math.floor((this.h-20)/lh));
    for(let i=0;i<maxL;i++){
      const y=this.y+18+i*lh;
      if(y>this.y+this.h-6) break;
      const key=P(['NODE','PORT','ID']);
      const val=key==='NODE'?NODE():key==='PORT'?RI(1,99):IDS();
      this.txt(ctx,key,this.x+6,y,Math.min(8,this.h/6),'left',PAL.fg3);
      this.txt(ctx,val,this.x+this.w-6,y,Math.min(8,this.h/6),'right',PAL.fg);
    }
    this.unwrap(ctx);
  }
}

class GaugeP extends Panel{
  draw(ctx,t){
    this.wrap(ctx);
    const cx=this.x+this.w/2, cy=this.y+this.h/2;
    const r=Math.min(this.w,this.h)/2-10;
    if(r>6){
      const pct=(this.seed*100)%100;
      ctx.strokeStyle=PAL.grid; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(cx,cy,r,-Math.PI*.75,Math.PI*.75); ctx.stroke();
      ctx.strokeStyle=PAL.fg; ctx.lineWidth=2.5;
      const end=-Math.PI*.75+(pct/100)*Math.PI*1.5;
      ctx.beginPath(); ctx.arc(cx,cy,r,-Math.PI*.75,end); ctx.stroke();
      this.txt(ctx,Math.floor(pct)+'%',cx,cy-2,Math.min(14,r/2),'center',PAL.fg,'middle');
    }
    this.txt(ctx,P(['PWR','LOAD']),this.x+this.w/2,this.y+this.h-8,7,'center',PAL.fg2,'bottom');
    this.unwrap(ctx);
  }
}

class WaveP extends Panel{
  draw(ctx,t){
    this.wrap(ctx);
    this.txt(ctx,'(ANALOG)',this.x+6,this.y+5,8,'left',PAL.fg2);
    const pad=6, h2=this.y+this.h/2;
    const availH=Math.max(2, this.h/2-pad-10);
    const availW=this.w-pad*2;
    ctx.strokeStyle=PAL.fg; ctx.lineWidth=1;
    ctx.beginPath();
    const phase = t*0.0008 + this.seed*50;
    for(let i=0;i<=availW;i+=2){
      const px=this.x+pad+i;
      const py=h2+Math.sin(i*0.04+phase)*availH*0.5+Math.sin(i*0.1+phase*0.6)*availH*0.25;
      if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.stroke();
    ctx.strokeStyle=PAL.grid;
    ctx.beginPath(); ctx.moveTo(this.x+pad,h2); ctx.lineTo(this.x+this.w-pad,h2); ctx.stroke();
    this.unwrap(ctx);
  }
}

class NetP extends Panel{
  draw(ctx,t){
    this.wrap(ctx);
    this.txt(ctx,'RELAY',this.x+6,this.y+5,8);
    const n=RI(3,5), pad=8, nodes=[];
    for(let i=0;i<n;i++){
      nodes.push({
        x:this.x+pad+R(0,Math.max(1,this.w-pad*2)),
        y:this.y+16+R(0,Math.max(1,this.h-24))
      });
    }
    ctx.strokeStyle=PAL.fg2; ctx.lineWidth=0.5;
    for(let i=0;i<nodes.length;i++){
      for(let j=i+1;j<nodes.length;j++){
        if(Math.random()>0.5){
          ctx.beginPath(); ctx.moveTo(nodes[i].x,nodes[i].y); ctx.lineTo(nodes[j].x,nodes[j].y); ctx.stroke();
        }
      }
    }
    for(const nd of nodes){
      ctx.fillStyle=PAL.bg; ctx.beginPath(); ctx.arc(nd.x,nd.y,2,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle=PAL.fg; ctx.lineWidth=1; ctx.beginPath(); ctx.arc(nd.x,nd.y,2,0,Math.PI*2); ctx.stroke();
    }
    this.unwrap(ctx);
  }
}

class LogP extends Panel{
  draw(ctx,t){
    this.wrap(ctx);
    this.txt(ctx,'LOG_'+RI(100,999),this.x+6,this.y+5,8);
    const lines=['ACCESS','PACKET','CHECKSUM','BUFFER','SYNC'];
    const lh=Math.max(10, this.h/6);
    const maxL=Math.max(1, Math.floor((this.h-16)/lh));
    for(let i=0;i<maxL;i++){
      const y=this.y+14+i*lh;
      if(y>this.y+this.h-4) break;
      const ts=`${RI(0,23).toString().padStart(2,'0')}:${RI(0,59).toString().padStart(2,'0')}`;
      this.txt(ctx,ts+' '+P(lines),this.x+6,y,Math.min(7,this.h/8),'left',i===0?PAL.fg:PAL.fg3);
    }
    this.unwrap(ctx);
  }
}

class CompassP extends Panel{
  draw(ctx,t){
    this.wrap(ctx);
    const cx=this.x+this.w/2, cy=this.y+this.h/2;
    const r=Math.min(this.w,this.h)/2-8;
    if(r>8){
      ctx.strokeStyle=PAL.fg; ctx.lineWidth=1;
      for(let i=0;i<8;i++){
        const a=(i/8)*Math.PI*2;
        const len=i%2===0?r:r-4;
        ctx.beginPath(); ctx.moveTo(cx+Math.cos(a)*(r-2),cy+Math.sin(a)*(r-2));
        ctx.lineTo(cx+Math.cos(a)*len,cy+Math.sin(a)*len); ctx.stroke();
      }
      ctx.beginPath(); ctx.arc(cx,cy,r-2,0,Math.PI*2); ctx.stroke();
      const arrowA=t*0.00015+this.seed*Math.PI*2;
      ctx.beginPath(); ctx.moveTo(cx+Math.cos(arrowA)*r*0.55,cy+Math.sin(arrowA)*r*0.55);
      ctx.lineTo(cx+Math.cos(arrowA+2.8)*r*0.2,cy+Math.sin(arrowA+2.8)*r*0.2);
      ctx.lineTo(cx+Math.cos(arrowA-2.8)*r*0.2,cy+Math.sin(arrowA-2.8)*r*0.2);
      ctx.closePath(); ctx.fillStyle=PAL.fg; ctx.fill();
    }
    this.unwrap(ctx);
  }
}

class NumP extends Panel{
  draw(ctx,t){
    this.wrap(ctx);
    const num=RI(1,999).toString().padStart(3,'0');
    const fs=Math.min(this.w-12, this.h-12, 48)*0.55;
    if(fs>=10){
      ctx.font=`bold ${fs}px 'Inter',Arial,sans-serif`;
      ctx.fillStyle=PAL.fg; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(num, this.x+this.w/2, this.y+this.h/2);
    }
    this.unwrap(ctx);
  }
}

class HexP extends Panel{
  draw(ctx,t){
    this.wrap(ctx);
    this.txt(ctx,'FIRM',this.x+6,this.y+5,8);
    const cols=Math.max(1,Math.floor((this.w-12)/48));
    for(let i=0;i<Math.min(6,Math.floor((this.h-16)/14)*cols);i++){
      const col=i%cols, row=Math.floor(i/cols);
      this.txt(ctx,'0x'+IDS(),this.x+6+col*48,this.y+16+row*14,7);
    }
    this.unwrap(ctx);
  }
}

class BarP extends Panel{
  draw(ctx,t){
    this.wrap(ctx);
    this.txt(ctx,P(['PACKET','BANDWIDTH']),this.x+6,this.y+5,8);
    const bw=Math.max(8,this.w-12), bh=Math.max(6,this.h-24);
    const bx=this.x+6, by=this.y+14;
    const bars=Math.min(24, Math.max(6, Math.floor(bw/4)));
    const barW=bw/bars;
    for(let i=0;i<bars;i++){
      const h=R(0.15,1)*bh;
      ctx.fillStyle=i%3===0?PAL.fg:PAL.fg2;
      ctx.fillRect(bx+i*barW+0.5, by+bh-h, Math.max(1,barW-1), h);
    }
    this.unwrap(ctx);
  }
}

class StatusP extends Panel{
  draw(ctx,t){
    this.wrap(ctx);
    const st=P([{l:'ONLINE',sub:P(JP),on:true},{l:'OFFLINE',sub:'STBY',on:false},{l:'ACTIVE',sub:'MON',on:true},{l:'ERR',sub:'ID:'+IDS(),on:false}]);
    const blink=st.on&&Math.sin(t*0.001)>0;
    const fs=Math.min(this.w-8, this.h-14, 22)*0.35;
    if(fs>=7){
      ctx.font=`bold ${fs}px 'Inter',Arial,sans-serif`;
      ctx.fillStyle=blink?PAL.fg:PAL.fg3; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(st.l, this.x+this.w/2, this.y+this.h/2-2);
    }
    if(this.h>40){
      this.txt(ctx,st.sub,this.x+this.w/2,this.y+this.h-8,7,'center',PAL.fg2,'bottom');
    }
    if(st.on && this.w>24){
      ctx.fillStyle=Math.sin(t*0.002)>0?PAL.fg:PAL.bg;
      ctx.beginPath(); ctx.arc(this.x+7,this.y+7,2,0,Math.PI*2); ctx.fill();
    }
    this.unwrap(ctx);
  }
}

class ErrorP extends Panel{
  draw(ctx,t){
    this.wrap(ctx);
    ctx.fillStyle=PAL.alert;
    ctx.fillRect(this.x+1,this.y+1,this.w-2,Math.min(14,this.h/4));
    ctx.fillStyle='#fff'; ctx.font=`bold 8px 'JetBrains Mono',monospace`; ctx.textAlign='center';
    ctx.fillText('ERR',this.x+this.w/2,this.y+10);
    if(this.h>30){
      this.txt(ctx,'REBOOT',this.x+6,this.y+20,7);
      this.txt(ctx,RI(0,5)+'/100',this.x+this.w-6,this.y+20,7,'right');
    }
    if(this.h>40){
      const barW=Math.max(10,this.w-12);
      ctx.fillStyle=PAL.grid; ctx.fillRect(this.x+6,this.y+32,barW,3);
      ctx.fillStyle=PAL.alert; ctx.fillRect(this.x+6,this.y+32,barW*(RI(0,5)/100),3);
    }
    this.unwrap(ctx);
  }
}

class DotP extends Panel{
  draw(ctx,t){
    this.wrap(ctx);
    this.txt(ctx,P(['MEM','CFG']),this.x+6,this.y+5,8);
    const cols=Math.max(2,Math.floor((this.w-12)/6));
    const rows=Math.max(2,Math.floor((this.h-18)/6));
    for(let r=0;r<rows;r++){
      for(let c=0;c<cols;c++){
        if(Math.random()>0.35){
          ctx.fillStyle=((c+r)%7<1)?PAL.fg:PAL.fg2;
          ctx.fillRect(this.x+6+c*6,this.y+16+r*6,2,2);
        }
      }
    }
    this.unwrap(ctx);
  }
}

class SpokeP extends Panel{
  draw(ctx,t){
    this.wrap(ctx);
    this.txt(ctx,'EPOCH',this.x+6,this.y+5,8);
    const cx=this.x+this.w/2, cy=this.y+this.h/2+1;
    const r=Math.min(this.w,this.h)/2-10;
    if(r>6){
      const spokes=RI(5,9);
      ctx.strokeStyle=PAL.fg2; ctx.lineWidth=0.5;
      const rot=t*0.00008*this.seed;
      for(let i=0;i<spokes;i++){
        const a=(i/spokes)*Math.PI*2+rot;
        ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r); ctx.stroke();
      }
      ctx.beginPath(); ctx.arc(cx,cy,2,0,Math.PI*2); ctx.strokeStyle=PAL.fg; ctx.lineWidth=1; ctx.stroke();
    }
    this.unwrap(ctx);
  }
}

class OverlapP extends Panel{
  draw(ctx,t){
    this.wrap(ctx);
    const cx=this.x+this.w/2, cy=this.y+this.h/2;
    const r=Math.min(this.w,this.h)/3;
    if(r>5){
      ctx.strokeStyle=PAL.fg; ctx.lineWidth=1;
      ctx.beginPath(); ctx.arc(cx-r*0.3,cy,r,0,Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.arc(cx+r*0.3,cy,r,0,Math.PI*2); ctx.stroke();
      ctx.fillStyle=PAL.fg;
      ctx.fillRect(cx-1,cy-r+2,2,r*2-4);
      ctx.fillRect(cx-r+2,cy-1,r*2-4,2);
    }
    this.txt(ctx,'SYNC',this.x+this.w/2,this.y+6,7,'center');
    this.unwrap(ctx);
  }
}

class TempP extends Panel{
  draw(ctx,t){
    this.wrap(ctx);
    this.txt(ctx,'SENSORS',this.x+6,this.y+5,8);
    const readings=[{l:'TMP',v:R(18,35).toFixed(1)+'°C'},{l:'PRS',v:R(.8,2.5).toFixed(1)+'kPa'},{l:'VLT',v:R(3,5.2).toFixed(1)+'V'}];
    const lh=Math.max(11, this.h/5);
    const maxL=Math.min(readings.length, Math.max(1, Math.floor((this.h-16)/lh)));
    for(let i=0;i<maxL;i++){
      const y=this.y+14+i*lh;
      if(y>this.y+this.h-4) break;
      this.txt(ctx,readings[i].l,this.x+6,y,Math.min(8,this.h/6),'left',PAL.fg3);
      this.txt(ctx,readings[i].v,this.x+this.w-6,y,Math.min(8,this.h/6),'right',PAL.fg);
    }
    this.unwrap(ctx);
  }
}

class GeoP extends Panel{
  draw(ctx,t){
    this.wrap(ctx);
    this.txt(ctx,'EXPORT',this.x+6,this.y+5,8);
    const cx=this.x+this.w/2, cy=this.y+this.h/2;
    const s=Math.min(this.w,this.h)*0.22;
    if(s>5){
      ctx.strokeStyle=PAL.fg; ctx.lineWidth=1;
      ctx.beginPath();
      for(let i=0;i<6;i++){
        const a=(i/6)*Math.PI*2;
        const px=cx+Math.cos(a)*s, py=cy+Math.sin(a)*s;
        if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      ctx.closePath(); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx-s*0.7,cy-s*0.25); ctx.lineTo(cx+s*0.7,cy+s*0.25); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx+s*0.7,cy-s*0.25); ctx.lineTo(cx-s*0.7,cy+s*0.25); ctx.stroke();
    }
    this.unwrap(ctx);
  }
}

class AccessP extends Panel{
  draw(ctx,t){
    this.wrap(ctx);
    const ok=this.seed>0.5;
    const label=ok?'OK':'DENIED';
    const fs=Math.min(this.w-8, this.h-12, 24)*0.4;
    if(fs>=7){
      ctx.fillStyle=ok?PAL.fg:PAL.alert;
      ctx.font=`bold ${fs}px 'Inter',Arial,sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(label,this.x+this.w/2,this.y+this.h/2-2);
    }
    if(this.h>36){
      this.txt(ctx,NODE().split('-')[0],this.x+6,this.y+this.h-8,7,'left',PAL.fg2,'bottom');
    }
    this.unwrap(ctx);
  }
}

class VertP extends Panel{
  draw(ctx,t){
    this.wrap(ctx);
    ctx.save();
    ctx.translate(this.x+9,this.y+this.h-6);
    ctx.rotate(-Math.PI/2);
    ctx.font=`bold 8px 'JetBrains Mono',monospace`; ctx.fillStyle=PAL.fg; ctx.textAlign='left';
    ctx.fillText('CTRL',0,0);
    ctx.restore();
    ctx.strokeStyle=PAL.fg2; ctx.lineWidth=0.5;
    const n=Math.max(2,Math.floor((this.h-14)/8));
    for(let i=0;i<n;i++){
      const y=this.y+7+i*((this.h-14)/n);
      ctx.beginPath(); ctx.moveTo(this.x+16,y); ctx.lineTo(this.x+this.w-4,y); ctx.stroke();
    }
    this.unwrap(ctx);
  }
}

const TYPES=[DataP,GaugeP,WaveP,NetP,LogP,CompassP,NumP,HexP,BarP,StatusP,ErrorP,DotP,SpokeP,OverlapP,TempP,GeoP,AccessP,VertP];

function generateLayout(){
  panels=[];
  const cols=Math.floor(W/cell), rows=Math.floor(H/cell);
  if(cols<3 || rows<3) return;
  const grid=Array(rows).fill(0).map(()=>Array(cols).fill(false));
  function can(x,y,w,h){if(x+w>cols||y+h>rows)return false;for(let i=y;i<y+h;i++)for(let j=x;j<x+w;j++)if(grid[i][j])return false;return true;}
  function place(x,y,w,h,p){for(let i=y;i<y+h;i++)for(let j=x;j<x+w;j++)grid[i][j]=true;p.x=x*cell;p.y=y*cell;p.w=w*cell;p.h=h*cell;panels.push(p);}
  const sizes=W<500
    ? [[1,1],[1,2],[2,1],[2,2],[1,3],[3,1]]
    : [[1,1],[1,2],[2,1],[2,2],[2,3],[3,2],[3,3],[3,1],[1,3],[4,2],[2,4]];
  for(let a=0;a<1200;a++){
    const x=RI(0,cols-1), y=RI(0,rows-1), sz=P(sizes);
    if(can(x,y,sz[0],sz[1])) place(x,y,sz[0],sz[1], new(P(TYPES))(0,0,0,0));
  }
}

function draw(){
  ctx.fillStyle=PAL.bg; ctx.fillRect(0,0,W,H);
  // align grid to cell
  ctx.strokeStyle=PAL.grid; ctx.lineWidth=0.5;
  for(let x=0;x<W;x+=cell){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for(let y=0;y<H;y+=cell){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  panels.forEach(p=>p.draw(ctx,time));
  // scanlines
  ctx.fillStyle='rgba(0,0,0,0.015)';
  for(let y=0;y<H;y+=5) ctx.fillRect(0,y,W,1);
}

function loop(){time+=16; draw(); requestAnimationFrame(loop);}
function regenerate(){generateLayout();}
function exportPNG(){
  const link=document.createElement('a');
  link.download='micrographics-'+Date.now()+'.png';
  link.href=canvas.toDataURL('image/png');
  link.click();
}
window.addEventListener('resize',resize);
resize(); loop();
</script>
</body>
</html>
